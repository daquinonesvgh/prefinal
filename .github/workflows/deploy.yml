# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App 

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: crprefinal.azurecr.io/ # el login server 
          username: ${{ secrets.APP_USERNAME }} #secreto de github username azure conteiner registry 
          password: ${{ secrets.APP_PASSWORD}} #secreto de github password azure conteiner registry 

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: crprefinal.azurecr.io/nombre-imagen:latest #aca debe de ir el nombre de la imagen 
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'waprefinal' #nombre de app services 
          slot-name: 'Production'
          images: 'crprefinal.azurecr.io/nombre-imagen:latest' #nombre de la imagen 
          publish-profile: ${{ secrets.APP_PUBLISH_PROFILE }}  # Se debe de subir el contenido de la publish profile de azure que está en overview
